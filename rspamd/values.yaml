# Default values for rspamd.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ectobit/rspamd
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ''

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

podAnnotations: {}

podSecurityContext:
  fsGroup: 101

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  controllerPort: 11334
  port: 11333
  proxyPort: 11332

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  # -- Additional Rspamd options rendered to /etc/rspamd/local.d/options.inc.
  options: ''
  # -- ARC module configuration rendered to /etc/rspamd/local.d/arc.conf.
  arc: ''
  # -- Rspamd RBL overrides rendered to /etc/rspamd/local.d/rbl.conf. Use this to disable or override individual RBL rules.
  rbl: ''
  # -- Rspamd settings rendered to /etc/rspamd/local.d/settings.conf. Use this for scoped policy overrides.
  settings: ''
  historyRedis:
    # -- Render /etc/rspamd/local.d/history_redis.conf when embedded or external Redis is enabled.
    enabled: true
    # -- Redis history key prefix. The default matches Rspamd upstream and expands inside Rspamd.
    keyPrefix: 'rs_history{{HOSTNAME}}{{COMPRESS}}'
    # -- Maximum number of Redis history rows.
    nrows: 200
    # -- Enable Redis history compression.
    compress: true
    # -- Enable Redis history subject privacy.
    subjectPrivacy: false
    # -- Additional raw Rspamd history_redis configuration.
    extraConfig: ''
  workerController:
    # -- Render /etc/rspamd/local.d/worker-controller.inc.
    enabled: true
    # -- Rspamd controller bind socket. Keep localhost-only unless namespace-local access is required.
    bindSocket: 'localhost:11334'
    # -- IPs or CIDR ranges allowed to access the controller.
    secureIp:
      - '127.0.0.1'
      - '::1'
    # -- Optional controller password.
    password: ''
    # -- Additional raw Rspamd controller worker configuration.
    extraConfig: ''
  blacklist:
    fromMap: ''
    ipMap: ''
  whitelist:
    fromMap: ''
    ipMap: ''
  milterHeaders: |
    use = ["x-spamd-bar", "x-spam-level", "authentication-results"];
    authenticated_headers = ["authentication-results"];
  dkimSelector: 2020
  multiMap: |
    WHITELIST_IP {
      type = "ip";
      map = "$CONFDIR/local.d/whitelist_ip.map";
      description = "Local ip whitelist";
      action = "accept";
    }

    WHITELIST_FROM {
      type = "from";
      map = "$CONFDIR/local.d/whitelist_from.map";
      description = "Local from whitelist";
      action = "accept";
    }
  overrideClassifierBayes: |
    autolearn = true;

redis:
  # -- Enable the Redis dependency.
  enabled: false
  # -- Redis deployment architecture.
  architecture: standalone
  auth:
    # -- Enable Redis password authentication. Keep disabled unless Rspamd Redis password configuration is provided separately.
    enabled: false

externalRedis:
  # -- Use an external Redis-compatible backend, such as Valkey, instead of the embedded Redis dependency.
  enabled: false
  # -- External Redis or Valkey hostname.
  host: ''
  # -- External Redis or Valkey port.
  port: 6379
  # -- Optional Redis database number rendered as Rspamd `db`.
  db: ''
  # -- Optional Redis ACL username.
  username: ''
  # -- Optional Redis password. Rendered into a Secret, not a ConfigMap. Prefer existingSecret for production.
  password: ''
  # -- Existing Secret containing the Redis password. An init container reads it through REDIS_PASSWORD and writes the final Redis config to an emptyDir before Rspamd starts.
  existingSecret: ''
  # -- Key in externalRedis.existingSecret containing the Redis password.
  existingSecretPasswordKey: password
  # -- Optional Rspamd Redis timeout value.
  timeout: ''
  tls:
    # -- Enable TLS for the external Redis connection.
    enabled: false
    # -- Existing Secret containing the TLS CA and optional client certificate/key files.
    existingSecret: ''
    # -- CA filename inside externalRedis.tls.existingSecret.
    caFilename: ca.crt
    # -- Optional client certificate filename inside externalRedis.tls.existingSecret.
    certFilename: ''
    # -- Optional client certificate key filename inside externalRedis.tls.existingSecret.
    certKeyFilename: ''
    # -- Optional TLS SNI name.
    sni: ''
    # -- Disable TLS certificate verification. Leave false unless the backend certificate cannot be verified.
    noVerify: false

persistence:
  enabled: false
  # existingClaim: ""
  accessMode: ReadWriteOnce
  size: 128Mi
  # storageClass: ""
  annotations: {}
