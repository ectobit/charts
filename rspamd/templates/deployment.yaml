{{- include "rspamd.validateRedis" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rspamd.fullname" . }}
  labels:
    {{- include "rspamd.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rspamd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ toYaml .Values.config | sha256sum }}
        checksum/redis-config: {{ printf "%s\n%s\n%s" (include "rspamd.redisEnabled" .) (include "rspamd.redisConfig" .) (include "rspamd.historyRedisConfig" .) | sha256sum }}
    {{- if .Values.externalRedis.enabled }}
        checksum/external-redis-secret: {{ toYaml .Values.externalRedis | sha256sum }}
    {{- end }}
    {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
    {{- end }}
      labels:
        {{- include "rspamd.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "rspamd.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: proxy
              containerPort: 11332
              protocol: TCP
            - name: rspamd
              containerPort: 11333
              protocol: TCP
            - name: controller
              containerPort: 11334
              protocol: TCP
            - name: fuzzy
              containerPort: 11335
              protocol: TCP
        {{- if and .Values.externalRedis.enabled .Values.externalRedis.existingSecret }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalRedis.existingSecret }}
                  key: {{ .Values.externalRedis.existingSecretPasswordKey }}
        {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/rspamd
            - name: run
              mountPath: /run/rspamd
          {{- if include "rspamd.redisEnabled" . }}
            - name: {{ ternary "redis-config" "config" .Values.externalRedis.enabled }}
              mountPath: /etc/rspamd/local.d/redis.conf
              subPath: redis.conf
          {{- if .Values.config.historyRedis.enabled }}
            - name: {{ ternary "redis-config" "config" .Values.externalRedis.enabled }}
              mountPath: /etc/rspamd/local.d/history_redis.conf
              subPath: history_redis.conf
          {{- end }}
          {{- end }}
          {{- if and .Values.externalRedis.enabled .Values.externalRedis.tls.enabled .Values.externalRedis.tls.existingSecret }}
            - name: redis-tls
              mountPath: /etc/rspamd/redis-tls
              readOnly: true
          {{- end }}
            - name: config
              mountPath: /etc/rspamd/local.d/worker-normal.inc
              subPath: worker-normal.inc
            - name: config
              mountPath: /etc/rspamd/local.d/worker-proxy.inc
              subPath: worker-proxy.inc
          {{- if .Values.config.workerController.enabled }}
            - name: config
              mountPath: /etc/rspamd/local.d/worker-controller.inc
              subPath: worker-controller.inc
          {{- end }}
          {{- with .Values.config.options }}
            - name: config
              mountPath: /etc/rspamd/local.d/options.inc
              subPath: options.inc
          {{- end }}
          {{- with .Values.config.rbl }}
            - name: config
              mountPath: /etc/rspamd/local.d/rbl.conf
              subPath: rbl.conf
          {{- end }}
          {{- with .Values.config.settings }}
            - name: config
              mountPath: /etc/rspamd/local.d/settings.conf
              subPath: settings.conf
          {{- end }}
          {{- with .Values.config.arc }}
            - name: config
              mountPath: /etc/rspamd/local.d/arc.conf
              subPath: arc.conf
          {{- end }}
            - name: config
              mountPath: /etc/rspamd/local.d/dkim_signing.conf
              subPath: dkim_signing.conf
            - name: config
              mountPath: /etc/rspamd/local.d/milter_headers.conf
              subPath: milter_headers.conf
            - name: config
              mountPath: /etc/rspamd/local.d/classifier-bayes.conf
              subPath: classifier-bayes.conf
            - name: config
              mountPath: /etc/rspamd/override.d/classifier-bayes.conf
              subPath: override-classifier-bayes.conf
            - name: config
              mountPath: /etc/rspamd/local.d/multimap.conf
              subPath: multimap.conf
            - name: config
              mountPath: /etc/rspamd/local.d/whitelist_ip.map
              subPath: whitelist_ip.map
            - name: config
              mountPath: /etc/rspamd/local.d/whitelist_from.map
              subPath: whitelist_from.map
            - name: config
              mountPath: /etc/rspamd/local.d/blacklist_ip.map
              subPath: blacklist_ip.map
            - name: config
              mountPath: /etc/rspamd/local.d/blacklist_from.map
              subPath: blacklist_from.map
          livenessProbe:
            exec:
              command:
                - curl
                - -f
                - -L
                - http://localhost:11334/
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - curl
                - -f
                - -L
                - http://localhost:11334/
            initialDelaySeconds: 10
            timeoutSeconds: 5
            periodSeconds: 60
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (include "rspamd.fullname" .) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: run
          emptyDir: {}
        - name: config
          configMap:
            name: {{include "rspamd.fullname" .}}
      {{- if .Values.externalRedis.enabled }}
        - name: redis-config
          secret:
            secretName: {{ include "rspamd.redisConfigSecretName" . }}
      {{- end }}
      {{- if and .Values.externalRedis.enabled .Values.externalRedis.tls.enabled .Values.externalRedis.tls.existingSecret }}
        - name: redis-tls
          secret:
            secretName: {{ .Values.externalRedis.tls.existingSecret }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
