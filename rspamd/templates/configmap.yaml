apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rspamd.fullname" . }}
  labels: {{- include "rspamd.labels" . | nindent 4}}
data:
{{- if .Values.redis.enabled }}
  redis.conf: |
    servers = "{{ .Release.Name }}-redis-master";
{{- if .Values.config.historyRedis.enabled }}
  history_redis.conf: |
    servers = {{ .Release.Name }}-redis-master:6379;
    key_prefix = {{ .Values.config.historyRedis.keyPrefix | quote }};
    nrows = {{ .Values.config.historyRedis.nrows }};
    compress = {{ .Values.config.historyRedis.compress }};
    subject_privacy = {{ .Values.config.historyRedis.subjectPrivacy }};
{{- with .Values.config.historyRedis.extraConfig }}
{{ . | nindent 4 }}
{{- end }}
{{- end }}
  classifier-bayes.conf: |
    backend = "redis";
{{- else }}
  classifier-bayes.conf: ""
{{- end }}
  worker-normal.inc: |
    bind_socket = "*:11333";
  worker-proxy.inc: |
    bind_socket = "*:11332";
    upstream "local" {
      default = yes;
      self_scan = yes;
    }
{{- if .Values.config.workerController.enabled }}
  worker-controller.inc: |
    bind_socket = {{ .Values.config.workerController.bindSocket | quote }};
{{- range .Values.config.workerController.secureIp }}
    secure_ip = {{ . | quote }};
{{- end }}
{{- with .Values.config.workerController.password }}
    password = {{ . | quote }};
{{- end }}
{{- with .Values.config.workerController.extraConfig }}
{{ . | nindent 4 }}
{{- end }}
{{- end }}
{{- with .Values.config.options }}
  options.inc: |{{ . | nindent 4 }}
{{- end }}
{{- with .Values.config.rbl }}
  rbl.conf: |{{ . | nindent 4 }}
{{- end }}
{{- with .Values.config.settings }}
  settings.conf: |{{ . | nindent 4 }}
{{- end }}
{{- with .Values.config.arc }}
  arc.conf: |{{ . | nindent 4 }}
{{- end }}
  dkim_signing.conf: |
    path = "/var/lib/rspamd/dkim/$selector.key";
    selector = {{ .Values.config.dkimSelector | quote }};
    # Enable DKIM signing for alias sender addresses
    allow_username_mismatch = true;
  milter_headers.conf: |
{{ .Values.config.milterHeaders | indent 4 }}
  override-classifier-bayes.conf: |
{{ .Values.config.overrideClassifierBayes | indent 4 }}
  multimap.conf: |
{{ .Values.config.multiMap | indent 4 }}
  whitelist_ip.map: |
{{ .Values.config.whitelist.ipMap | indent 4 }}
  whitelist_from.map: |
{{ .Values.config.whitelist.fromMap | indent 4 }}
  blacklist_ip.map: |
{{ .Values.config.blacklist.ipMap | indent 4 }}
  blacklist_from.map: |
{{ .Values.config.blacklist.fromMap | indent 4 }}
